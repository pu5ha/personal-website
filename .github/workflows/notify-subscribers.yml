name: Notify subscribers of new blog post

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog posts
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1..HEAD -- 'content/blog/*.md')
          if [ -z "$NEW_FILES" ]; then
            echo "No new blog posts found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            # Extract slug from first new file
            SLUG=$(echo "$NEW_FILES" | head -1 | sed 's|content/blog/||' | sed 's|\.md$||')
            echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "New post detected: $SLUG"
          fi

      - name: Wait for Vercel deployment
        if: steps.detect.outputs.found == 'true'
        run: sleep 120

      - name: Send email to subscribers
        if: steps.detect.outputs.found == 'true'
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST "https://www.chaskin.xyz/api/send-post/" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SEND_SECRET }}" \
              -d "{\"slug\": \"${{ steps.detect.outputs.slug }}\"}")
            if [ "$STATUS" = "200" ]; then
              echo "Success: $(cat /tmp/response.txt)"
              exit 0
            fi
            echo "Attempt $i failed with status $STATUS: $(cat /tmp/response.txt)"
            if [ "$i" -lt 3 ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
          done
          echo "All attempts failed"
          exit 1
